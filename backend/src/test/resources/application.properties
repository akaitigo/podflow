quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:podflow;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.flyway.migrate-at-start=false

# gRPC test client
quarkus.grpc.clients.episode-service.host=localhost

# JWT Authentication (test)
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://podflow.akaitigo.com
smallrye.jwt.sign.key.location=privateKey.pem
podflow.jwt.expiration-minutes=60

# Allow all endpoints in tests by default (individual auth tests handle their own tokens)
quarkus.http.auth.permission.public-health.paths=/health
quarkus.http.auth.permission.public-health.policy=permit
quarkus.http.auth.permission.public-auth.paths=/auth/*
quarkus.http.auth.permission.public-auth.policy=permit
