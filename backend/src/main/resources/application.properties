quarkus.application.name=podflow
quarkus.http.port=8080

# gRPC
quarkus.grpc.server.port=9000

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/podflow
quarkus.datasource.username=podflow
quarkus.datasource.password=${DB_PASSWORD}

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Connect-Protocol-Version
quarkus.http.cors.exposed-headers=Grpc-Status,Grpc-Message

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=validate

# Flyway
quarkus.flyway.migrate-at-start=true

# JWT Authentication
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://podflow.akaitigo.com
smallrye.jwt.sign.key.location=privateKey.pem
podflow.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Public endpoints (no auth required)
quarkus.http.auth.permission.public-health.paths=/health
quarkus.http.auth.permission.public-health.policy=permit
quarkus.http.auth.permission.public-auth.paths=/auth/*
quarkus.http.auth.permission.public-auth.policy=permit
