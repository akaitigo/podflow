version: v2

plugins:
  # Kotlin / Java protobuf
  - remote: buf.build/protocolbuffers/java
    out: ../backend/src/main/java
    opt:
      - lite

  # Kotlin / Java gRPC stubs
  - remote: buf.build/grpc/java
    out: ../backend/src/main/java
    opt:
      - lite

  # TypeScript protobuf messages + Connect service definitions (protoc-gen-es v2)
  - local: ["pnpm", "--dir", "../frontend", "exec", "protoc-gen-es"]
    out: ../frontend/src/gen
    opt:
      - target=ts
