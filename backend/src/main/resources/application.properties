quarkus.application.name=podflow
quarkus.http.port=8080

# gRPC
quarkus.grpc.server.port=9000

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/podflow
quarkus.datasource.username=podflow
quarkus.datasource.password=${DB_PASSWORD}

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Connect-Protocol-Version
quarkus.http.cors.exposed-headers=Grpc-Status,Grpc-Message

# Hibernate
quarkus.hibernate-orm.database.generation=validate

# Flyway
quarkus.flyway.migrate-at-start=true
